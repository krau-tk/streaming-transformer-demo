<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流式语音识别 Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 { margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #555;
        }
        .status-dot.connected { background: #4caf50; }
        .status-dot.recording { background: #f44336; animation: pulse 1s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .controls { margin-bottom: 20px; display: flex; gap: 12px; align-items: center; }
        button {
            padding: 12px 32px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        #btn-start {
            background: #4caf50;
            color: white;
        }
        #btn-start:hover { background: #45a049; }
        #btn-start:disabled { background: #555; cursor: not-allowed; }
        #btn-stop {
            background: #f44336;
            color: white;
            display: none;
        }
        #btn-stop:hover { background: #d32f2f; }

        .divider {
            width: 100%;
            max-width: 700px;
            border-top: 1px solid #333;
            margin: 20px 0;
        }

        .file-section {
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        .file-section h2 {
            font-size: 1.1rem;
            margin-bottom: 12px;
            color: #ccc;
        }
        .file-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        #file-input {
            color: #aaa;
        }
        #btn-upload {
            background: #2196f3;
            color: white;
            padding: 10px 24px;
        }
        #btn-upload:hover { background: #1976d2; }
        #btn-upload:disabled { background: #555; cursor: not-allowed; }
        .file-info {
            font-size: 0.8rem;
            color: #888;
            margin-top: 8px;
        }

        .transcript-box {
            width: 100%;
            max-width: 700px;
            min-height: 200px;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .info {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
            text-align: center;
        }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid #666;
            border-top-color: #2196f3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <h1>流式语音识别 Demo</h1>
    <p class="subtitle">Zipformer2 + Streaming Attention Decoder</p>

    <div class="status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">未连接</span>
    </div>

    <div class="controls">
        <button id="btn-start">开始录音</button>
        <button id="btn-stop">停止录音</button>
    </div>

    <div class="divider"></div>

    <div class="file-section">
        <h2>离线音频识别</h2>
        <div class="file-controls">
            <input type="file" id="file-input" accept="audio/*,.wav,.flac,.mp3,.ogg,.m4a">
            <button id="btn-upload" disabled>上传识别</button>
        </div>
        <div class="file-info" id="file-info"></div>
    </div>

    <div class="transcript-box" id="transcript"></div>

    <p class="info">
        采样率: 16kHz | Chunk: 450ms | 模型: Zipformer2 + Attention Decoder (Wait Token)
    </p>

    <script src="/static/app.js"></script>
</body>
</html>
